body:
  text: 徊風大混合帝一之道存修九圖修本經存祝名都畢更閉兩目存此百神變成白氣如日煙之狀從玄虚中來入口中鬱鬱良乆覺白氣下從下部孔中出又從玉莖孔中出又覺白氣從兩脚底兩手心中出並冠纒一軀上下手足混合一身與白氣同煙上下不相見也良久白氣怱復變色成紫雲鬱鬱又從我口中入頭中及至五藏之間充滿腹内良久紫雲又從兩足底兩掌心大孔玉莖孔中出冠繞一體良久鬱然上下與紫雲合形不相見也須㬰存紫雲之氣充满左右及一室之内又存見口中出風氣之扇紫雲之烟乃回轉更相纒繞結忽成一真人男形也始生之狀長四分號曰大洞帝一尊君名父寜在字合母精是守死關之衆神回風混合共成帝一之尊君也又存此尊君來入我口中舌下復從舌下徑上昇紫房六合宫平坐外向尊君左手把兆五籍右手把兆五符尊君口之左邊有日光徑九分尊君口之右邊有月光徑一寸尊君口舌吐徊風之氣吹此日月之光皆鬱鬱或白色或赤色令光氣下入兆五藏六府百節一身之内洞徹朗然内外如白日之狀良久忘身忽然事訖此圖眉間略畫形像即存如第八圖大在紫房六合宫即泥丸宫是六合乃心祝曰大洞帝一太素尊靈父寜母精二合雙成百真大混一徊始生身結八烟變胎元嬰日月寳光洞我軀形太一在上與帝合并泥丸保玉五藏華明長合日月手執洞經位爲仙翁神升上清三十九章金符羽庭此是徊風大混合帝一之道畢也萬變百化洞真太一之法極盡於此矣夕夕常存大洞帝一尊君在兆鼻下人中中央白日常存在口内上齒之外鼻下人中上脣之裏也尊君形皆當向外坐立起居在意存之存尊君口中衘日光徑九分照明萬丈同朗兆身夫一者帝之真一也一之所變歸一者也讀洞真經時亦存帝一尊君在兆面前以尊神口對兆之口間令相向聽我讀洞經之音以散七世之結焉帝一尊君諱父寜在字合毋精日夕恒憶之勿忘辟萬試滅千患除惡魔致神仙也若兆體中有疾痛不寜處急存帝一尊君令口吐日光白氣熏我痛疾處痛疾即愈也帝一尊君形如始生之男不着衣服身長四分耳所謂大混反胎始形之真也大洞内法存修雌雄真一十三圖按九官前後逐官相沓向背遮影不能對見難以正面圖畫今據排次第即在右側作正面畫却沉若側身畫即又存想不正請存各官真神益面向前正坐其中三真者即二真相對今如隱居注首寸與明堂共得一寸雖正畫成亦係在右邊也精詳存用如經九年白日昇天大洞金華玉經
