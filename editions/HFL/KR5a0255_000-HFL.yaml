front:
  text: 大洞金華玉經果二夫得受大洞之訣洞一上道雌一合變當先誦帝君上願玄母八間金華隱書斯乃九天帝君懷中禁書也若傳授弟子當先告齋前後各一日又清齋一百日乃得付之中齋七十日下齋三十九日對齋苦行而相傳授焉不審其人無齋而傳付者經師當死受者失兩明焉齋不苦切經師當病受者失口焉施重於經師防輕覽也灾加於弟子慎口目矣愆重禍於七世患結生於𡨋考若得此經受便施行不得愆犯懈替宣泄之約一如上法饌經師於三齋如奉君父焉考幽室於閑林如寂無人焉存五神於紫房如真靈之在焉非君師父子兄弟之施者必勿受矣示虚真之物用明守禁之難犯也非君師父子兄弟之室者必勿履矣示止足之勿廣明隱逸之抱一也非君師父子兄弟之服者必勿服矣示天親之勿多明盈溢以自裁也研天精之妙覺絶萬累之近想而至行彰於辛苦絶跡同於無景三餐足於山澗宻誠著於遂往爾乃聲馳於五老之室德舉於三清之上保内凝於明玉使衣巾鮮而不穢念三元於泥丸守九真於形宅吐納五華呼吸玉液朝暮求仙於空同寢息啓神於太漠孜孜不倦勤勤不𥼶如此之人始可與言大洞之門戸預求道之妙想矣奉之者登三晨遊太霄違之者没三泉入太幽夫傳授之者當令經訣再出勿頓授者也先授法訣者欲令其施行存思精錬五形感念紫房流穢蕩情專貞抱一旦夕期靈故大丹隱玄號曰金華經三元玉晨是曰雌一精也按存修雌一三年之後乃又得誦大洞真經三十九章耳今受此訣赤得施行施行訣事必獲神仙不必俱持大洞真經而一通之也夫存感篤誠合真對景三元見矣自獲此經玄虚降授黄老告符運靈引曜五老散華空中受文即登太無帝君十二願篇目曰願天願地願風願雲願隂願陽願太空願太無願太虚願大有願自生願生神也玄母八門行間篇目曰願玄母與我俱生於生氣之間與我俱存於日月之間與我俱保於九天之間與我俱食於自然之間與我俱飲於匏河之間與我俱息於玉真之間與我俱寢於仙堂之間與我俱遊於三玄之間兆在别室常當讀是經不忘須㬰此爲内願帝君開善八間者矣今五嶽諸仙及神州仙女猶酌瓊漿而按珍果說大願陳八間期太素奉三元志霄晨爲玉真㧞七世入廣寒豈况世中之庸猥五濁之微賤者哉當可替而修聞而不爲耶夫形神雖精苦於生生而七世有罪而不解者巳亦必無仙翼也是以須啓大願陳八間以釋其積結耳七考既福兆乃可不死不死者乃得道之宗本爲仙之根始志行是業者可不勉勵於長存哉九天帝君十二上願九靈玄母八間神門文廻元五通禳除世殃上福七祖身致神仙靜於宻室散香正煙而讀大洞金華經曰北極天皇太一帝君玉清紫虚二景明圓無上大道太素三元四方五老六盖七晨八上九靈隱道廻元玄母五通金華髙仙司命天師主生大神太微天炁以醮因縁上願九玄護魄扶魂明真元炁並來在身仰招旡上五通大仙俯逮无下隱道廻元七世積罪今爲結散受福南宫灑香八門願天願地願風願雲四願一合定籍長生天盖胎根地助曜靈神風八扇景雲流盈我與帝君同飈上清觀眄北玄解帶玉庭慶加七祖玄考科真上願四達壽與日傾中願亦四領理帝君書願隂願陽願太空願太无三五明神七九所居帝君元父定生之初玉皇凝駕常在我廬我存紫房泥丸桃康凝隂固血魂生太陽靈空映暉太无履長空无九炁與我黄裳七考介福受仙南宫下願亦四長生仙府乃願太虚又願大有神存九天形遊真宇帝君混合徊遊七九禍去我室福來我取惡言消亡順言善愈復願自生天地爲父復願神生和氣爲母廻元五通有除罪垢福冠七葉超生彌乆願言髙皇帝君合唱唱音逸霄八響萬暢靈翰逆衝千真同償從劫至劫常㑹十二慶大哉帝君恩萬福廻元又願八間玄母造神八間之唱九靈洞眄上願玄母與我俱生於生氣之間得使紫景映虚天人合符飛真凌羽而我與之俱天樂娛心離脫百憂七玄稱慶上靈所扶次願玄母與我俱存於日月之間三光之際大帝併軒青旄緑盖華軿繡帔錦服玉帶擕提五老同賔四大入晏華寒出眄八外三願玄母與我俱保於九天之間乃凝真圎曜夷心内錬炁溢靈堂感神萬千身昇九霄考福重玄散帶空同撫輪累天吉享七世更生爲人我保太真與日同年四願玄母與我俱食於自然之間永離三徒長㑹自然七寳玉粒金丹紫芒隱芝右掇左拾夜光鳳胎虎沫雲琅瓊霜竒味一御則身拂太空五願玄母與我俱飲於匏河之間而流津萬崖旣清且甘廻水玉精靈潤碧藍上注絶霄流源神堂横波鬱踊鼓扇太空浮遊浩清飲嗽東蒙髙揖霞晨竒樂滄浪七考得仙介福洋洋體誓九河所向咸康六願玄母與我俱息於玉真之間浩哉上座澗邈霄清五老羅室玉華告靈西王飛軒策羽流軿與我俱息九玄之庭慶鍾七考受胎更生身槃瓊宇神栖圎明七願玄母與我俱寢於仙堂之間幽妙靈房玄華四陳朱宇鳳構光明映軒金床玉榻紫惟龍門上坐玄皇中席天真我處其右𢹂帶纒綿大福七考受書更生八願玄母與我俱遊於三玄之間乃逸轡太漠廻軿三玄五老扶胥王母比肩儛輪神丘停駕九天定書太上受位爲真雌一九混從億至千洞經八響七祖獲仙從劫至劫常㑹八間八間在何永我因縁五老降福道德詵詵萬氣上生固保泥丸願言既畢日月同年大哉虚生玄母動静八門行間
